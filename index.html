<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn With Maldhan</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
            overflow:hidden;
        }

        .card{
            text-align:center;
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(15px);
            padding:60px 40px;
            border-radius:20px;
            color:white;
            box-shadow:0 15px 40px rgba(0,0,0,.35);
            animation:float 4s ease-in-out infinite;
        }

        h1{
            font-size:3rem;
            margin-bottom:20px;
        }

        p{
            font-size:1.4rem;
            opacity:.9;
        }

        .rocket{
            font-size:50px;
            display:block;
            margin-bottom:20px;
            animation:rocket 2s infinite;
        }

        @keyframes float{
            0%,100%{transform:translateY(0);}
            50%{transform:translateY(-10px);}
        }

        @keyframes rocket{
            0%,100%{transform:translateY(0);}
            50%{transform:translateY(-12px);}
        }
    </style>
</head>

<body>

<div class="card">
    <span class="rocket">🚀</span>

    <h1>Hello Dosto!</h1>

    <p>Kaise Ho Aap? 👋</p>

    <br>

    <h2>❤️ Sabka Swagat Hai ❤️</h2>

    <br>

    <p>Welcome to <strong>Learn With Maldhan</strong></p>
</div>

</body>
</html>
